# Separate jobs so one failing platform does not block others uploading artifacts.
#
# Releases / assets:
# - Push a version tag matching `v*` (e.g. v1.0.1) **or** the alias tag `releases`
#   to run builds and attach available artifacts to that GitHub Release.
# - Or: Actions → this workflow → "Run workflow" → enable "Publish …" and set
#   "release_tag" to an **existing** tag (any name, e.g. `releases` or `v1.0.0`).
name: EarthPorn build artifacts

on:
  push:
    branches: [main, 'cursor/**']
    tags:
      - 'v*'
      - 'releases'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: After builds, upload assets to the GitHub Release for release_tag
        type: boolean
        default: false
      release_tag:
        description: Existing Git tag (e.g. v1.2.3 or releases); used when publish is checked
        type: string
        required: false
        default: ''

jobs:
  android-debug-apk:
    name: Android APK (debug-signed)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-android-debug-apk
          path: earthporn_wallpaper/build/app/outputs/flutter-apk/app-debug.apk

  linux-portable-bundle:
    name: Linux portable bundle (tar.gz)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev libkeybinder-3.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release
          tar czvf "$GITHUB_WORKSPACE/earthporn-linux-portable.tar.gz" bundle
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-linux-portable-tar-gz
          path: earthporn-linux-portable.tar.gz

  windows-portable-zip:
    name: Windows portable (zip)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - run: |
          cd build/windows/x64/runner/Release
          tar.exe -a -c -f "$env:GITHUB_WORKSPACE/earthporn-windows-portable.zip" *
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-windows-portable-zip
          path: earthporn-windows-portable.zip

  publish-github-release:
    name: Publish GitHub Release (tag push or manual)
    needs: [android-debug-apk, linux-portable-bundle, windows-portable-zip]
    if: >-
      always() &&
      !cancelled() &&
      (
        (github.ref_type == 'tag' && (
          startsWith(github.ref_name, 'v') ||
          startsWith(github.ref_name, 'V') ||
          github.ref_name == 'releases'
        )) ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.publish_github_release == 'true' &&
          github.event.inputs.release_tag != '')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag name
        id: rel
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            t=$(printf '%s' "$INPUT_TAG" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [ -z "$t" ]; then
              echo "release_tag is empty"
              exit 1
            fi
            echo "tag=$t" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-android-debug-apk
          path: rel

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-linux-portable-tar-gz
          path: rel

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-windows-portable-zip
          path: rel

      - name: Normalize release asset names and list uploads
        id: assets
        run: |
          set -euo pipefail
          mkdir -p rel
          cd rel
          if [ -f app-debug.apk ]; then mv -f app-debug.apk EarthPorn-Wallpaper-Android-debug.apk; fi
          if [ -f earthporn-linux-portable.tar.gz ]; then mv -f earthporn-linux-portable.tar.gz EarthPorn-Wallpaper-Linux-x64.tar.gz; fi
          if [ -f earthporn-windows-portable.zip ]; then mv -f earthporn-windows-portable.zip EarthPorn-Wallpaper-Windows-x64.zip; fi
          ls -la
          files=""
          for f in EarthPorn-Wallpaper-Android-debug.apk EarthPorn-Wallpaper-Linux-x64.tar.gz EarthPorn-Wallpaper-Windows-x64.zip; do
            if [ -f "$f" ]; then files="${files}rel/${f}"$'\n'; fi
          done
          if [ -z "$files" ]; then
            echo "No build artifacts to attach. Re-run failed platform jobs, then re-run this workflow or re-push the tag."
            exit 1
          fi
          {
            echo "files<<EOF"
            printf '%s' "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.assets.outputs.files }}
