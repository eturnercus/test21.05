# Separate jobs so one failing platform does not block others uploading artifacts.
#
# Releases / assets:
# - Push a tag `v<semver>` that matches `version:` in earthporn_wallpaper/pubspec.yaml
#   (e.g. pubspec `1.3.2+27` → tag `v1.3.2` or `v1.3.2+27`). Artifacts attach to that Release.
# - Or: Actions → this workflow → "Run workflow" → enable "Publish …" and set
#   "release_tag" to an **existing** tag in the same format.
name: EarthPorn build artifacts

on:
  push:
    branches: [main, 'cursor/**']
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: After builds, upload assets to the GitHub Release for release_tag
        type: boolean
        default: false
      release_tag:
        description: 'Existing Git tag: v + version from pubspec (e.g. v1.3.2 or v1.3.2+27)'
        type: string
        required: false
        default: ''

jobs:
  android-debug-apk:
    name: Android APK (debug-signed)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-android-debug-apk
          path: earthporn_wallpaper/build/app/outputs/flutter-apk/app-debug.apk

  linux-portable-bundle:
    name: Linux portable bundle (tar.gz)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev libkeybinder-3.0-dev squashfs-tools file wget
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release
          tar czvf "$GITHUB_WORKSPACE/earthporn-linux-portable.tar.gz" bundle
      - run: bash scripts/pack_linux_appimage.sh
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-linux-portable-tar-gz
          path: earthporn-linux-portable.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-linux-appimage
          path: earthporn_wallpaper/EarthPorn-Wallpaper-*.AppImage

  windows-portable-zip:
    name: Windows portable (zip)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - run: dart run msix:create
        continue-on-error: true
      - run: |
          cd build/windows/x64/runner/Release
          tar.exe -a -c -f "$env:GITHUB_WORKSPACE/earthporn-windows-portable.zip" *
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-windows-portable-zip
          path: earthporn-windows-portable.zip
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-windows-msix
          path: earthporn_wallpaper/build/windows/x64/runner/Release/*.msix

  publish-github-release:
    name: Publish GitHub Release (tag push or manual)
    needs: [android-debug-apk, linux-portable-bundle, windows-portable-zip]
    if: >-
      always() &&
      !cancelled() &&
      (
        (github.ref_type == 'tag' && (
          startsWith(github.ref_name, 'v') ||
          startsWith(github.ref_name, 'V')
        )) ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.publish_github_release == 'true' &&
          github.event.inputs.release_tag != '')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read app version from pubspec
        id: meta
        run: |
          set -euo pipefail
          RAW=$(grep '^version:' earthporn_wallpaper/pubspec.yaml | head -1 | awk '{print $2}')
          BASE="${RAW%%+*}"
          echo "raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag name
        id: rel
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            t=$(printf '%s' "$INPUT_TAG" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [ -z "$t" ]; then
              echo "release_tag is empty"
              exit 1
            fi
            echo "tag=$t" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release tag matches pubspec version
        run: |
          set -euo pipefail
          RAW="${{ steps.meta.outputs.raw }}"
          BASE="${{ steps.meta.outputs.base }}"
          TAG="${{ steps.rel.outputs.tag }}"
          T="$TAG"
          T="${T#v}"
          T="${T#V}"
          if [ "$T" != "$BASE" ] && [ "$T" != "$RAW" ]; then
            echo "Tag '$TAG' must be v${BASE} or v${RAW} (pubspec version line: $RAW)."
            exit 1
          fi

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-android-debug-apk
          path: rel

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-linux-portable-tar-gz
          path: rel

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-linux-appimage
          path: rel

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-windows-portable-zip
          path: rel

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: earthporn-windows-msix
          path: rel

      - name: Normalize release asset names and list uploads
        id: assets
        run: |
          set -euo pipefail
          mkdir -p rel
          cd rel
          if [ -f app-debug.apk ]; then mv -f app-debug.apk EarthPorn-Wallpaper-Android-debug.apk; fi
          if [ -f earthporn-linux-portable.tar.gz ]; then mv -f earthporn-linux-portable.tar.gz EarthPorn-Wallpaper-Linux-x64.tar.gz; fi
          if [ -f earthporn-windows-portable.zip ]; then mv -f earthporn-windows-portable.zip EarthPorn-Wallpaper-Windows-x64.zip; fi
          FOUND=$(find . -maxdepth 6 \( -name 'EarthPorn-Wallpaper-*.AppImage' -o -name '*.AppImage' \) -print -quit)
          if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then mv -f "$FOUND" EarthPorn-Wallpaper-Linux-x86_64.AppImage; fi
          FOUND=$(find . -maxdepth 6 -name '*.msix' -print -quit)
          if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then mv -f "$FOUND" EarthPorn-Wallpaper-Windows-x64.msix; fi
          ls -la
          files=""
          for f in EarthPorn-Wallpaper-Android-debug.apk EarthPorn-Wallpaper-Linux-x64.tar.gz EarthPorn-Wallpaper-Linux-x86_64.AppImage EarthPorn-Wallpaper-Windows-x64.zip EarthPorn-Wallpaper-Windows-x64.msix; do
            if [ -f "$f" ]; then files="${files}rel/${f}"$'\n'; fi
          done
          if [ -z "$files" ]; then
            echo "No build artifacts to attach. Re-run failed platform jobs, then re-run this workflow or re-push the tag."
            exit 1
          fi
          {
            echo "files<<EOF"
            printf '%s' "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: EarthPorn Wallpaper v${{ steps.meta.outputs.base }}
          generate_release_notes: true
          files: ${{ steps.assets.outputs.files }}
