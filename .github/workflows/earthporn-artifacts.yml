# Separate jobs so one failing platform does not block others uploading artifacts.
name: EarthPorn build artifacts

on:
  push:
    branches: [main, 'cursor/**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: After builds, upload assets to a GitHub Release for the tag below
        type: boolean
        default: false
      release_tag:
        description: Git tag (e.g. v1.2.3); must exist on origin. Used only when publish is checked.
        type: string
        required: false
        default: ''

jobs:
  android-debug-apk:
    name: Android APK (debug-signed)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-android-debug-apk
          path: earthporn_wallpaper/build/app/outputs/flutter-apk/app-debug.apk

  linux-portable-bundle:
    name: Linux portable bundle (tar.gz)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev libkeybinder-3.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release
          tar czvf "$GITHUB_WORKSPACE/earthporn-linux-portable.tar.gz" bundle
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-linux-portable-tar-gz
          path: earthporn-linux-portable.tar.gz

  windows-portable-zip:
    name: Windows portable (zip)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: earthporn_wallpaper
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - run: |
          cd build/windows/x64/runner/Release
          tar.exe -a -c -f "$env:GITHUB_WORKSPACE/earthporn-windows-portable.zip" *
      - uses: actions/upload-artifact@v4
        with:
          name: earthporn-windows-portable-zip
          path: earthporn-windows-portable.zip

  publish-github-release:
    name: Publish GitHub Release (tag push or manual)
    needs: [android-debug-apk, linux-portable-bundle, windows-portable-zip]
    # Tag push: ref is refs/tags/v*. Manual run: ref is a branch — use inputs instead.
    if: >-
      (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) ||
      (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish_github_release == 'true' &&
        startsWith(github.event.inputs.release_tag, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag name
        id: rel
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ] && [[ "$REF_NAME" == v* ]]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: earthporn-android-debug-apk
          path: rel

      - uses: actions/download-artifact@v4
        with:
          name: earthporn-linux-portable-tar-gz
          path: rel

      - uses: actions/download-artifact@v4
        with:
          name: earthporn-windows-portable-zip
          path: rel

      - name: Normalize release asset names
        run: |
          set -eux
          cd rel
          test -f app-debug.apk
          mv -f app-debug.apk EarthPorn-Wallpaper-Android-debug.apk
          mv -f earthporn-linux-portable.tar.gz EarthPorn-Wallpaper-Linux-x64.tar.gz
          mv -f earthporn-windows-portable.zip EarthPorn-Wallpaper-Windows-x64.zip
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          files: |
            rel/EarthPorn-Wallpaper-Android-debug.apk
            rel/EarthPorn-Wallpaper-Linux-x64.tar.gz
            rel/EarthPorn-Wallpaper-Windows-x64.zip
