name: earthporn_wallpaper
description: r/EarthPorn wallpapers from RSS — Android, Linux, Windows. By eturnercus.
publish_to: 'none'
version: 1.2.0+21

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  xml: ^6.5.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  crypto: ^3.0.6
  window_manager: ^0.4.3
  tray_manager: ^0.5.0
  image_size_getter: ^2.4.0
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  path: ^1.9.0
  collection: ^1.19.0
  synchronized: ^3.3.0+3
  provider: ^6.1.2
  wallpaper_manager_plus: ^2.0.3
  hotkey_manager: ^0.2.3
  launch_at_startup: ^0.5.1
  flutter_animate: ^4.5.2
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#0d2818"
  adaptive_icon_foreground: assets/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/tray.png
    - assets/app_icon.png
